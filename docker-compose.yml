services:
  tiger-cowork:
    build: .
    # container_name intentionally omitted so Docker auto-generates a
    # unique name per project (e.g. "ceteau-main-tiger-cowork-1") and
    # re-runs / parallel test instances never collide on the name.
    ports:
      - "8080:3001"
    env_file:
      - .env
    volumes:
      - tiger-data:/app/data
      - tiger-uploads:/app/uploads
    restart: unless-stopped

volumes:
  tiger-data:
  tiger-uploads:
