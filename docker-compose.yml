services:
  ceteau-ai:
    build: .
    # container_name intentionally omitted so Docker auto-generates a
    # unique name per project (e.g. "tiger_cowork-main-ceteau-ai-1") and
    # re-runs / parallel test instances never collide on the name.
    ports:
      # Host:Container — 8080 on the host, 3001 inside the container.
      - "8080:3001"
    env_file:
      - .env
    volumes:
      - tiger-data:/app/data
      - tiger-uploads:/app/uploads
    restart: unless-stopped

volumes:
  tiger-data:
  tiger-uploads:
